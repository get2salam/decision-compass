<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Decision Compass</title>
    <meta
      name="description"
      content="A calm local-first decision matrix for weighted comparisons."
    />
    <link rel="stylesheet" href="./styles/tokens.css" />
    <link rel="stylesheet" href="./styles/app.css" />
    <link rel="stylesheet" href="./styles/matrix.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar card">
        <div class="brand">
          <h1>Decision Compass</h1>
          <p>Local-first weighted choices, without the noise.</p>
        </div>
        <div class="spacer"></div>
        <button class="btn" data-action="import">Import</button>
        <button class="btn" data-action="export">Export</button>
        <button class="btn" data-action="help">Shortcuts</button>
        <button class="btn btn-primary" data-action="new-decision">New decision</button>
        <input id="import-file" type="file" accept=".json,application/json" hidden />
      </header>

      <section class="hero">
        <article class="hero-card card">
          <h2 data-role="decision-title">Compare options with calm, weighted clarity</h2>
          <p data-role="decision-note">
            Score your options against the criteria that matter, tune the weights,
            and let the ranking update instantly.
          </p>
        </article>
        <aside class="summary-card card">
          <h2>At a glance</h2>
          <div class="summary-stats">
            <div class="stat">
              <strong data-role="options-count">0</strong>
              <span>options</span>
            </div>
            <div class="stat">
              <strong data-role="criteria-count">0</strong>
              <span>criteria</span>
            </div>
            <div class="stat">
              <strong data-role="confidence-score">0%</strong>
              <span>confidence</span>
            </div>
            <div class="stat">
              <strong data-role="best-choice">—</strong>
              <span>best choice</span>
            </div>
          </div>
        </aside>
      </section>

      <section class="workspace" data-role="workspace" aria-label="Decision matrix"></section>
      <section class="results" data-role="results" aria-label="Ranking results" aria-live="polite"></section>
    </main>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
